apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-cluster
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  project: default
  source:
    chart: rook-ceph-cluster
    repoURL: https://charts.rook.io/release
    targetRevision: v1.19.6
    helm:
      valuesObject:
        configOverride: |
          [global]
          mon_osd_down_out_interval = 1800
        
        ingress:
          dashboard:
            ingressClassName: nginx
            annotations:
              external-dns.alpha.kubernetes.io/target: ingress.ceph.impl.nl
              external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
              cert-manager.io/cluster-issuer: letsencrypt-production
            host:
              name: rook.ceph.impl.nl
            tls:
              - secretName: rook.ceph.impl.nl
                hosts:
                  - rook.ceph.impl.nl
        monitoring:
          enabled: true
          metricsDisabled: false
        toolbox:
          enabled: true
        cephClusterSpec:
          cephConfig:
            mgr:
              mgr/alerts/smtp_host: "smtp.google.com"
              mgr/alerts/smtp_port: "25"
              mgr/alerts/smtp_ssl: "false"
              mgr/alerts/smtp_destination: "bhuism@odee.net"
              mgr/alerts/smtp_sender: "bhuism@odee.net"
              mgr/alerts/smtp_from_name: "Rook-Ceph Production Cluster"
          removeOSDsIfOutAndSafeToRemove: true
          mon:
            count: 3
            allowMultiplePerNode: false
          mgr:
            count: 2
            modules:
              - name: pg_autoscaler
                enabled: true
              - name: rook
                enabled: true
              - name: restful
                enabled: true
              - name: nfs
                enabled: false
              - name: cephadm
                enabled: false
              - name: diskprediction_local
                enabled: true
              - name: insights
                enabled: true
              - name: alerts
                enabled: true
          resources:
            mgr:
              limits:
                memory: "1Gi"
              requests:
                cpu: "500m"
                memory: "1Gi"
            mon:
              limits:
                memory: "1Gi"
              requests:
                cpu: "1000m"
                memory: "1Gi"
            osd:
              limits:
                cpu: 2
                memory: "4Gi"
              requests:
                cpu: 1
                memory: "2Gi"
            mds:
              limits:
                memory: "4Gi"
              requests:
                cpu: "1000m"
                memory: "2Gi"
          dashboard:
            enabled: true
            ssl: false
            prometheusEndpoint: http://prometheus-kube-prometheus-prometheus.prometheus:9090
            prometheusEndpointSSLVerify: false
          network:
            provider: host
          storage:
            allowDeviceClassUpdate: true
            allowOsdCrushWeightUpdate: true
            useAllNodes: false
            useAllDevices: false
            nodes:
              - name: node65
              - name: node66
              - name: node67
                devices:
                  - name: sda
                  - name: sdb
              - name: node68
              - name: node69
              - name: node70
                devices:
                  - name: /dev/disk/by-id/nvme-TS4TMTE250S_I877750037
                  - name: /dev/disk/by-id/ata-Samsung_SSD_870_EVO_4TB_S758NX0W714880B
                  - name: /dev/disk/by-id/usb-JMicron_Tech_DD56419883893-0:0
              - name: node71
                devices:
                  - name: nvme0n1
                  - name: nvme1n1
                  - name: nvme2n1
          crashCollector:
            disable: true
            daysToRetain: 7
          placement:
            all:
              tolerations:
                - key: "node.kubernetes.io/unschedulable"
                  operator: "Exists"
                  effect: "NoSchedule"
                - key: node-role.kubernetes.io/control-plane
                  operator: "Exists"
                  effect: "NoSchedule"
        cephBlockPools:
          - name: ceph-blockpool-big
            spec:
              replicated:
                size: 3
              enableRBDStats: true
            storageClass:
              enabled: false
        cephFileSystems:
          - name: ceph-filesystem
            # see https://github.com/rook/rook/blob/master/Documentation/CRDs/Shared-Filesystem/ceph-filesystem-crd.md#filesystem-settings for available configuration
            spec:
              metadataPool:
                replicated:
                  size: 3
              dataPools:
                - failureDomain: host
                  replicated:
                    size: 2
                  name: data0
              metadataServer:
                activeCount: 1
                activeStandby: true
            storageClass:
              enabled: false
        cephBlockPoolsVolumeSnapshotClass:
          enabled: false
        cephFileSystemVolumeSnapshotClass:
          enabled: false
        cephObjectStores: []
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
